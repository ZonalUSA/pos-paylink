<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Pay your bill</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:#f5f6f8; color:#1a1a1a; }
  .wrap { max-width:460px; margin:0 auto; padding:24px 18px 48px; }
  h1 { font-size:20px; margin:8px 0 2px; }
  .muted { color:#666; font-size:14px; }
  .card { background:#fff; border-radius:14px; padding:20px; margin-top:16px;
          box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .brand { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
  .brand img { max-height:40px; max-width:160px; border-radius:6px; }
  .brand .name { font-size:18px; font-weight:700; }
  .bill { font-size:34px; font-weight:700; }
  .link { color:#1A73E8; font-size:14px; font-weight:600; cursor:pointer;
          background:none; border:0; padding:0; margin-top:10px; }
  .lines { margin-top:10px; display:none; border-top:1px solid #eee; padding-top:8px; }
  .lines.show { display:block; }
  .line { display:flex; justify-content:space-between; font-size:14px; padding:3px 0; }
  .line .q { color:#666; }
  .line-total { display:flex; justify-content:space-between; font-weight:700;
                border-top:1px solid #eee; margin-top:6px; padding-top:6px; font-size:15px; }
  .tips { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
  .tip { border:1.5px solid #d9dce1; background:#fff; border-radius:12px; padding:14px;
         font-size:16px; font-weight:600; cursor:pointer; text-align:center; }
  .tip small { display:block; font-weight:400; color:#666; margin-top:2px; }
  .tip.sel { border-color:#1A73E8; background:#eaf1fe; }
  .custom { margin-top:12px; display:none; }
  .custom.show { display:block; }
  .custom input { width:100%; font-size:18px; padding:12px; border:1.5px solid #d9dce1;
                  border-radius:12px; }
  .total { display:flex; justify-content:space-between; margin-top:18px; font-size:18px;
           font-weight:700; }
  button.pay { width:100%; margin-top:18px; padding:16px; font-size:17px; font-weight:700;
               color:#fff; background:#1A73E8; border:0; border-radius:12px; cursor:pointer; }
  button.pay:disabled { opacity:.5; }
</style>
</head>
<body>
<div class="wrap" id="root"><div class="card"><p class="muted">Loading your check…</p></div></div>
<script>
(function () {
  var root = document.getElementById('root');
  function money(n) { return '$' + Number(n).toFixed(2); }
  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function msg(text) {
    root.innerHTML = '<h1>Pay your bill</h1><div class="card"><p class="muted">' +
      text + '</p></div>';
  }

  var params = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  var orderId = params.get('order');
  var apiBase = params.get('api');
  if (!orderId || !apiBase) { msg('This payment link is incomplete.'); return; }

  var api = apiBase.replace(/\/+$/, '') + '/functions/v1/pay-tip?order=' +
    encodeURIComponent(orderId);

  fetch(api).then(function (r) { return r.json(); }).then(function (d) {
    if (!d.ok) {
      var reasons = {
        paid: 'This check has already been paid. Thank you!',
        notfound: 'This check could not be found yet — give it a moment and rescan.',
        nothing: 'There is nothing left to pay on this check.'
      };
      msg(reasons[d.reason] || 'Sorry, this check is not available.');
      return;
    }
    render(d);
  }).catch(function () { msg('Could not load your check. Please try again.'); });

  function render(d) {
    var bill = d.amount;
    var tipCents = 0;
    var tiles = (d.tips || []).map(function (t) {
      return '<div class="tip" data-tip="' + Math.round(t.amount * 100) + '">' +
        t.pct + '%<small>' + money(t.amount) + '</small></div>';
    }).join('');

    var brandHtml = '';
    if (d.brand || d.logo) {
      brandHtml = '<div class="brand">' +
        (d.logo ? '<img src="' + esc(d.logo) + '" alt="">' : '') +
        (d.brand ? '<span class="name">' + esc(d.brand) + '</span>' : '') +
        '</div>';
    }

    var linesHtml = '';
    if (d.lines && d.lines.length) {
      var rows = d.lines.map(function (l) {
        return '<div class="line"><span><span class="q">' + l.qty + '× </span>' +
          esc(l.name) + '</span><span>' + money(l.amount) + '</span></div>';
      }).join('');
      linesHtml =
        '<button class="link" id="toggleLines">View check details ▾</button>' +
        '<div class="lines" id="linesBox">' + rows +
          '<div class="line-total"><span>Total due</span><span>' + money(bill) +
          '</span></div>' +
        '</div>';
    }

    root.innerHTML =
      brandHtml +
      '<h1>Pay your bill</h1>' +
      '<p class="muted">Order #' + d.orderNumber + '</p>' +
      '<div class="card">' +
        '<div class="muted">Amount due</div>' +
        '<div class="bill">' + money(bill) + '</div>' +
        linesHtml +
        '<div class="muted" style="margin-top:18px;font-weight:600;color:#1a1a1a">Add a tip?</div>' +
        '<div class="tips">' + tiles +
          '<div class="tip" data-tip="custom">Custom</div>' +
          '<div class="tip sel" data-tip="0">No tip</div>' +
        '</div>' +
        '<div class="custom" id="customWrap">' +
          '<input id="customAmt" type="number" inputmode="decimal" min="0" step="0.01" placeholder="Tip amount ($)">' +
        '</div>' +
        '<div class="total"><span>Total</span><span id="total">' + money(bill) + '</span></div>' +
        '<button class="pay" id="pay">Continue to payment</button>' +
      '</div>';

    var toggle = document.getElementById('toggleLines');
    if (toggle) {
      toggle.addEventListener('click', function () {
        var box = document.getElementById('linesBox');
        var open = box.classList.toggle('show');
        toggle.textContent = open ? 'Hide check details ▴' : 'View check details ▾';
      });
    }

    var tiles2 = root.querySelectorAll('.tip');
    var customWrap = document.getElementById('customWrap');
    var customAmt = document.getElementById('customAmt');
    var totalEl = document.getElementById('total');
    function renderTotal() { totalEl.textContent = money((bill * 100 + tipCents) / 100); }
    function select(t) { tiles2.forEach(function (x) { x.classList.remove('sel'); }); t.classList.add('sel'); }

    tiles2.forEach(function (tile) {
      tile.addEventListener('click', function () {
        select(tile);
        var v = tile.getAttribute('data-tip');
        if (v === 'custom') {
          customWrap.classList.add('show');
          var c = parseFloat(customAmt.value || '0');
          tipCents = isNaN(c) ? 0 : Math.max(0, Math.round(c * 100));
        } else {
          customWrap.classList.remove('show');
          tipCents = parseInt(v, 10) || 0;
        }
        renderTotal();
      });
    });
    customAmt.addEventListener('input', function () {
      var c = parseFloat(customAmt.value || '0');
      tipCents = isNaN(c) ? 0 : Math.max(0, Math.round(c * 100));
      renderTotal();
    });
    document.getElementById('pay').addEventListener('click', function () {
      var btn = this; btn.disabled = true; btn.textContent = 'Starting payment…';
      fetch(api + '&action=create&tip=' + tipCents)
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res.ok && res.url) { window.location = res.url; }
          else { msg('Sorry, we could not start your payment. Please ask your server.'); }
        })
        .catch(function () { msg('Sorry, we could not start your payment. Please ask your server.'); });
    });
  }
})();
</script>
</body>
</html>
